site_name: "1С: Внедрение — Документация"
site_description: "Сравнительный анализ УНФ и КА"
site_url: "https://andrzejabramov.github.io/integration_1c_unf/"
repo_url: "https://github.com/andrzejabramov/integration_1c_unf"

theme:
  name: material
  palette:
    primary: blue
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search

nav:
  - 📋 Выводы: resume.md

  - 📘 1С:УНФ:
    - Интерфейс: 1c_unf/interface_unf.md

  - 📘 1С:КА:
    - Интерфейс: 1c_ka/interface_ka.md

  - 📁 Алгоритмы (общие):
    - Настройка: 1c_algoritm/01_settings_algoritm.md
    - Начальные остатки: 1c_algoritm/02_initial_balances.md
    - Отдел продаж: 1c_algoritm/03_sales_department.md
    - Закупки: 1c_algoritm/04_purchases.md
    - Склад (материалы): 1c_algoritm/05_warehouse_materials.md
    - Производство: 1c_algoritm/06_production_workshop.md
    - ОТК: 1c_algoritm/07_otk_controller.md
    - Зарплата: 1c_algoritm/08_salary.md
    - Отгрузка: 1c_algoritm/09_sales_shipment.md
    - Себестоимость: 1c_algoritm/10_cost_calculation.md
    - Закрытие месяца: 1c_algoritm/11_month_closing.md
    - Интеграция: 1c_algoritm/12_integration.md
    - Отчёты: 1c_algoritm/13_reports_catalog.md
    - Troubleshooting: 1c_algoritm/14_troubleshooting.md

  - 🖼️ Скриншоты:
    - УНФ: img/unf/
    - КА: img/ka/

markdown_extensions:
  - toc
  - tables
  - admonition
  - codehilite
  - footnotes